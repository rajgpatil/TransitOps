version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: transitops-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-transitops}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-transitops}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: ./backend
    container_name: transitops-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override DB host to service name so containers can reach each other
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-transitops}
    depends_on:
      db:
        condition: service_healthy
    # Run Alembic migrations then start Uvicorn
    command: >
      sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    restart: unless-stopped

volumes:
  postgres_data:
