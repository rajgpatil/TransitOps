version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: transitops-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: transitops
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transitops"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: ./backend
    container_name: transitops-backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=transitops
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/transitops
      - SECRET_KEY=supersecretkeychangeinproduction1234567890
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python -m alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
